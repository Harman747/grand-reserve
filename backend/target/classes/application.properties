server.port=${PORT:8080}

spring.datasource.url=${SUPABASE_DB_URL:jdbc:h2:mem:grandreserve}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SUPABASE_DB_USER:sa}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.h2.console.enabled=${ENABLE_H2_CONSOLE:true}
spring.h2.console.path=/h2-console

spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

jwt.secret=GrandReserveSecretKey2024XYZ987654321ABCDEFabcdef
jwt.expiration=86400000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
